name: Feature Request
description: Propose an enhancement or new capability
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      placeholder: What user problem are we solving?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: Describe the preferred implementation approach.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: List alternative approaches and trade-offs.

  - type: dropdown
    id: scope
    attributes:
      label: Primary area
      options:
        - .API
        - .Core
        - .Client
        - apps/server/EVEMorgue.API
        - apps/server/EVEMorgue.Core
        - apps/client
        - docs
        - cross-cutting
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - low
        - medium
        - high
    validations:
      required: true
