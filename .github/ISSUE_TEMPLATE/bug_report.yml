name: Bug Report
description: Report a reproducible problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please provide clear reproduction details so we can investigate quickly.

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Go to ...
        2. Call endpoint ...
        3. Observe ...
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Affected area
      options:
        - .API
        - .Core
        - .Client
        - docs
        - unknown
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment details
      placeholder: OS, browser, runtime, versions
